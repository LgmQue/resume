<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>職務経歴書</title>
  <style>
    :root {
      --bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;
      --text:#e6edf3;--muted:#8b949e;--accent:#5b7cf6;--accent2:#38d9a9;
      --success:#3fb950;--danger:#f85149;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--text);font-family:'Meiryo UI','メイリオ','Hiragino Sans',sans-serif;font-size:15px;line-height:1.7;min-height:100dvh;}
    a{color:var(--accent);text-decoration:none;}
    a:hover{color:var(--accent2);text-decoration:underline;}
    .page{max-width:860px;margin:0 auto;padding:40px 24px 80px;}
    .state-box{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px;color:var(--muted);font-size:1rem;}
    .state-box .icon{font-size:2.5rem;opacity:0.4;}
    .header{border-bottom:1px solid var(--border);padding-bottom:28px;margin-bottom:32px;}
    .name-ja{font-size:2rem;font-weight:700;line-height:1.2;}
    .name-en{font-size:1rem;color:var(--muted);margin-top:4px;}
    .meta-chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px;}
    .meta-chip{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;font-size:0.82rem;color:var(--muted);}
    .social-links{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;}
    .social-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;font-size:0.8rem;color:var(--text);text-decoration:none;transition:border-color 0.15s,color 0.15s;}
    .social-chip:hover{border-color:var(--accent);color:var(--accent);text-decoration:none;}
    .summary{margin-top:18px;color:var(--muted);font-size:0.95rem;white-space:pre-wrap;}
    .section{margin-bottom:40px;}
    .section-title{font-size:0.72rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--accent);margin-bottom:16px;padding-bottom:6px;border-bottom:1px solid var(--border);}
    .skill-list{display:flex;flex-wrap:wrap;gap:8px;}
    .skill-chip{padding:3px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;font-size:0.82rem;}
    .timeline{display:flex;flex-direction:column;gap:0;}
    .company-block{position:relative;padding-left:20px;margin-bottom:28px;}
    .company-block::before{content:'';position:absolute;left:6px;top:10px;bottom:0;width:2px;background:var(--border);}
    .company-header{display:flex;align-items:baseline;gap:10px;margin-bottom:10px;}
    .company-dot{position:absolute;left:0;top:8px;width:14px;height:14px;border-radius:50%;background:var(--accent);border:2px solid var(--bg);flex-shrink:0;}
    .company-name{font-size:1.05rem;font-weight:700;}
    .company-tenure{font-size:0.8rem;color:var(--muted);}
    .entry-list{display:flex;flex-direction:column;gap:12px;}
    .entry-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px 16px;}
    .entry-period{font-size:0.78rem;color:var(--muted);margin-bottom:4px;}
    .entry-project{font-size:0.9rem;font-weight:600;margin-bottom:6px;}
    .entry-badges{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;}
    .badge{padding:2px 8px;border-radius:4px;font-size:0.75rem;background:var(--surface2);border:1px solid var(--border);color:var(--muted);}
    .badge.role{border-color:var(--accent);color:var(--accent);}
    .entry-body{font-size:0.85rem;color:var(--muted);white-space:pre-wrap;}
    .entry-label{font-size:0.72rem;font-weight:600;color:var(--text);margin-top:8px;margin-bottom:2px;}
    .cert-list{display:flex;flex-direction:column;gap:10px;}
    .cert-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 16px;}
    .cert-name{font-weight:600;font-size:0.95rem;}
    .cert-meta{font-size:0.78rem;color:var(--muted);margin-top:4px;}
    .output-list{display:flex;flex-direction:column;gap:8px;}
    .output-item{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 14px;display:flex;align-items:baseline;gap:10px;}
    .output-kind{font-size:0.72rem;font-weight:700;padding:2px 6px;border-radius:4px;background:var(--surface2);flex-shrink:0;}
    .output-title{font-size:0.88rem;flex:1;}
    .output-date{font-size:0.75rem;color:var(--muted);flex-shrink:0;}
    .footer{margin-top:60px;padding-top:20px;border-top:1px solid var(--border);text-align:center;font-size:0.75rem;color:var(--muted);}
    @media(max-width:600px){.page{padding:24px 16px 60px;}.name-ja{font-size:1.5rem;}.output-item{flex-wrap:wrap;}}
  </style>
</head>
<body>
<!-- RESUME_DATA_PLACEHOLDER -->
<script>window.__RESUME__ = window.__RESUME__ || null;</script>
<!-- /RESUME_DATA_PLACEHOLDER -->
<div id="app">
  <div class="state-box">
    <div class="icon">📋</div>
    <p>準備中です。しばらくお待ちください。</p>
  </div>
</div>

<script>
(() => {
  const app = document.getElementById('app');

  function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
  function fmtYM(s){if(!s)return '現在';const[y,m]=s.split('-');return `${y}年${String(m).padStart(2,'0')}月`;}
  function calcDuration(start,end){
    if(!start)return '';
    const[sy,sm]=start.split('-').map(Number);
    const now=new Date();
    const ey=end?Number(end.split('-')[0]):now.getFullYear();
    const em=end?Number(end.split('-')[1]):now.getMonth()+1;
    const months=(ey-sy)*12+(em-sm)+1;
    if(months<1)return '';
    const y=Math.floor(months/12),m=months%12;
    if(y===0)return `${m}ヶ月`;if(m===0)return `${y}年`;return `${y}年${m}ヶ月`;
  }
  function fmtTeamSize(s){if(!s)return s;return /^\d+$/.test(s.trim())?`${s.trim()}人`:s;}
  function multiline(s){return esc(s).replace(/\n/g,'<br>');}
  function groupByCompany(entries){
    const map=new Map();
    for(const e of entries){const k=e.company||'';if(!map.has(k))map.set(k,[]);map.get(k).push(e);}
    const groups=[];
    for(const[company,es]of map){
      const sorted=[...es].sort((a,b)=>{const ts=s=>{const p=s?.split('-').map(Number);return p?p[0]*100+p[1]:0;};return ts(b.periodStart)-ts(a.periodStart);});
      const earliest=sorted.reduce((acc,e)=>(!e.periodStart?acc:(!acc||e.periodStart<acc?e.periodStart:acc)),'');
      const hasNow=sorted.some(e=>!e.periodEnd);
      const latest=hasNow?'':sorted.reduce((acc,e)=>(!e.periodEnd?acc:(!acc||e.periodEnd>acc?e.periodEnd:acc)),'');
      groups.push({company,earliest,latest,entries:sorted});
    }
    return groups.sort((a,b)=>{const ts=s=>{const p=s?.split('-').map(Number);return p?p[0]*100+p[1]:0;};return ts(b.earliest)-ts(a.earliest);});
  }

  const data = window.__RESUME__;
  if(!data||!data.fullNameJa) return;

  const v=data.visibility??{};
  document.title=`${data.fullNameJa} - 職務経歴書`;

  const metaChips=[
    v.email!==false&&data.email?`<span class="meta-chip">✉ ${esc(data.email)}</span>`:'',
    v.phone!==false&&data.phone?`<span class="meta-chip">☏ ${esc(data.phone)}</span>`:'',
    v.nearestStation!==false&&data.nearestStation?`<span class="meta-chip">🚉 ${esc(data.nearestStation)}</span>`:'',
    v.birthDate!==false&&data.birthDate?`<span class="meta-chip">生 ${esc(data.birthDate)}</span>`:'',
  ].filter(Boolean).join('');

  const socialLinks=(data.socialLinks??[]).filter(l=>l.url).map(l=>{
    const label=l.service==='その他'&&l.label?l.label:l.service;
    return `<a class="social-chip" href="${esc(l.url)}" target="_blank" rel="noreferrer">${esc(label)}</a>`;
  }).join('');

  const skillsHtml=data.skillsJa?`<section class="section"><p class="section-title">技術スキル</p><div class="skill-list">${data.skillsJa.split('\n').map(s=>s.trim()).filter(Boolean).map(s=>`<span class="skill-chip">${esc(s)}</span>`).join('')}</div></section>`:'';

  const groups=groupByCompany(data.entries??[]);
  const timelineHtml=groups.length?`<section class="section"><p class="section-title">職務経歴</p><div class="timeline">${groups.map(g=>{
    const tenure=`${fmtYM(g.earliest)} ～ ${g.latest?fmtYM(g.latest):'現在'}`;
    const dur=calcDuration(g.earliest,g.latest);
    const entries=g.entries.map(e=>{
      const period=`${fmtYM(e.periodStart)} ～ ${e.periodEnd?fmtYM(e.periodEnd):'現在'}`;
      const dur2=calcDuration(e.periodStart,e.periodEnd);
      const project=[e.department,e.projectName].filter(Boolean).join(' / ');
      const techs=(e.technologies||'').split(/[,、，\n]/).map(t=>t.trim()).filter(Boolean);
      const badges=[
        e.role?`<span class="badge role">${esc(e.role)}</span>`:'',
        e.teamSize?`<span class="badge">${esc(fmtTeamSize(e.teamSize))}</span>`:'',
        ...techs.map(t=>`<span class="badge">${esc(t)}</span>`),
      ].filter(Boolean).join('');
      const body=[
        e.responsibilitiesJa?`<p class="entry-label">担当業務</p><p class="entry-body">${multiline(e.responsibilitiesJa)}</p>`:'',
        e.achievementsJa?`<p class="entry-label">実績・成果</p><p class="entry-body">${multiline(e.achievementsJa)}</p>`:'',
      ].filter(Boolean).join('');
      return `<div class="entry-card"><p class="entry-period">${esc(period)}${dur2?` (${esc(dur2)})`:''}` +
        `</p>${project?`<p class="entry-project">${esc(project)}</p>`:''}`+
        `${badges?`<div class="entry-badges">${badges}</div>`:''}`+
        `${body}</div>`;
    }).join('');
    return `<div class="company-block"><div class="company-dot"></div><div class="company-header"><span class="company-name">${esc(g.company||'（会社名未入力）')}</span><span class="company-tenure">${esc(tenure)}${dur?` (${esc(dur)})`:''}` +
      `</span></div><div class="entry-list">${entries}</div></div>`;
  }).join('')}</div></section>`:'';

  const certs=(data.certifications??[]).filter(c=>c.name);
  const certsHtml=v.certifications!==false&&certs.length?`<section class="section"><p class="section-title">資格・認定</p><div class="cert-list">${[...certs].sort((a,b)=>(b.issuedDate||'').localeCompare(a.issuedDate||'')).map(c=>{
    const meta=[c.issuer,c.issuedDate?`取得: ${c.issuedDate}`:'',c.expiryDate?`有効期限: ${c.expiryDate}`:'無期限'].filter(Boolean).join('　');
    const nameHtml=c.url?`<a href="${esc(c.url)}" target="_blank" rel="noreferrer">${esc(c.name)}</a>`:esc(c.name);
    return `<div class="cert-card"><p class="cert-name">${nameHtml}</p>${meta?`<p class="cert-meta">${esc(meta)}</p>`:''}</div>`;
  }).join('')}</div></section>`:'';

  const outputs=(data.outputs??[]);
  const outputsHtml=v.outputs!==false&&outputs.length?`<section class="section"><p class="section-title">記事・登壇・ウェビナー</p><div class="output-list">${[...outputs].sort((a,b)=>(b.date||'').localeCompare(a.date||'')).map(o=>{
    const dateStr=o.date?new Date(o.date).toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric',timeZone:'Asia/Tokyo'}):'';
    const titleHtml=o.url?`<a href="${esc(o.url)}" target="_blank" rel="noreferrer">${esc(o.title||o.url)}</a>`:esc(o.title);
    return `<div class="output-item"><span class="output-kind">${esc(o.kind)}</span><span class="output-title">${titleHtml}</span><span class="output-date">${esc(dateStr)}</span></div>`;
  }).join('')}</div></section>`:'';

  app.innerHTML=`<div class="page">
    <header class="header">
      <h1 class="name-ja">${esc(data.fullNameJa)}</h1>
      ${data.fullNameEn?`<p class="name-en">${esc(data.fullNameEn)}</p>`:''}
      ${metaChips?`<div class="meta-chips">${metaChips}</div>`:''}
      ${socialLinks?`<div class="social-links">${socialLinks}</div>`:''}
      ${data.summaryJa?`<p class="summary">${multiline(data.summaryJa)}</p>`:''}
    </header>
    ${skillsHtml}${timelineHtml}${certsHtml}${outputsHtml}
    <footer class="footer"><p>最終更新: ${esc(data.__publishedAt__||'—')}</p></footer>
  </div>`;
})();
</script>
</body>
</html>
