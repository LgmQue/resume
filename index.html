<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>職務経歴書</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #080c16;
      --bg2:       #0d1224;
      --surface:   #111827;
      --surf2:     #1a2236;
      --surf3:     #1f2a3d;
      --border:    rgba(99,130,200,.18);
      --border2:   rgba(99,130,200,.10);
      --text:      #e8edf8;
      --text2:     #b4bdd4;
      --muted:     #6b7a9f;
      --accent:    #6c8ef5;
      --accent-h:  #8ba4ff;
      --accent-glow: rgba(108,142,245,.35);
      --accent2:   #34d9b0;
      --grad:      linear-gradient(135deg,#6c8ef5 0%,#9b6cf5 100%);
      --warn:      #fbbf24;
      --success:   #34d399;
      --r-sm: 6px; --r-md: 10px; --r-lg: 14px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{
      background:var(--bg);color:var(--text);
      font-family:'Inter','Meiryo UI','メイリオ','Hiragino Sans',system-ui,sans-serif;
      font-size:15px;line-height:1.7;min-height:100dvh;
      -webkit-font-smoothing:antialiased;
    }
    a{color:var(--accent);text-decoration:none;}
    a:hover{color:var(--accent-h);text-decoration:underline;}
    .page{max-width:860px;margin:0 auto;padding:40px 24px 80px;}
    .state-box{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px;color:var(--muted);font-size:1rem;}
    .state-box .icon{font-size:2.5rem;opacity:0.4;}
    .header{
      padding:20px 22px 22px;margin-bottom:28px;
      background:linear-gradient(135deg,var(--surf2) 0%,rgba(26,34,54,.6) 100%);
      border:1px solid var(--border);border-radius:var(--r-lg);
    }
    .name-ja{
      font-size:1.8rem;font-weight:700;line-height:1.2;
      background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
      background-clip:text;
    }
    .name-en{font-size:0.9rem;color:var(--muted);margin-top:4px;}
    .meta-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px;}
    .meta-chip{
      display:inline-flex;align-items:center;gap:4px;
      padding:3px 10px;border-radius:20px;font-size:0.78rem;
      background:rgba(108,142,245,.1);border:1px solid rgba(108,142,245,.25);
      color:var(--accent-h);
    }
    .social-links{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
    .social-chip{
      display:inline-flex;align-items:center;gap:4px;padding:3px 10px;
      background:rgba(108,142,245,.1);border:1px solid rgba(108,142,245,.4);
      border-radius:20px;font-size:0.78rem;color:var(--accent);
      text-decoration:none;transition:background 0.15s,color 0.15s;
    }
    .social-chip:hover{background:rgba(108,142,245,.2);color:var(--accent-h);text-decoration:none;}
    .summary{
      margin-top:14px;color:var(--text);font-size:0.9rem;
      white-space:pre-wrap;line-height:1.75;
      border-top:1px solid var(--border2);padding-top:12px;
      border-left:3px solid var(--accent);padding-left:12px;
      background:rgba(108,142,245,.04);
      border-radius:0 var(--r-sm) var(--r-sm) 0;
    }
    .section{margin-bottom:32px;}
    .section-title{
      font-size:0.65rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;
      background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
      background-clip:text;
      margin-bottom:14px;padding-bottom:6px;
      border-bottom:1px solid var(--border2);
    }
    .skill-list{display:flex;flex-wrap:wrap;gap:6px;}
    .skill-chip{
      padding:3px 10px;font-size:0.78rem;font-weight:500;
      background:rgba(52,217,176,.08);border:1px solid rgba(52,217,176,.25);
      border-radius:20px;color:var(--accent2);
    }
    .timeline{display:flex;flex-direction:column;gap:0;}
    .company-block{position:relative;padding-left:28px;margin-bottom:22px;}
    .company-block::before{
      content:'';position:absolute;left:6px;top:22px;bottom:-4px;width:2px;
      background:linear-gradient(180deg,rgba(108,142,245,.5) 0%,rgba(108,142,245,.0) 100%);
    }
    .company-dot{
      position:absolute;left:0;top:8px;width:14px;height:14px;border-radius:50%;
      background:var(--grad);box-shadow:0 0 8px var(--accent-glow);flex-shrink:0;
    }
    .company-header{display:flex;align-items:baseline;gap:8px;margin-bottom:8px;flex-wrap:wrap;}
    .company-name{font-size:0.95rem;font-weight:700;color:var(--text);}
    .company-tenure{
      font-size:0.76rem;color:var(--muted);
      padding:1px 7px;background:var(--surf2);border:1px solid var(--border);
      border-radius:20px;white-space:nowrap;
    }
    .entry-list{display:flex;flex-direction:column;gap:12px;}
    .entry-card{
      background:rgba(17,24,39,.7);
      border:1px solid var(--border);
      border-left:3px solid rgba(108,142,245,.4);
      border-radius:0 var(--r-md) var(--r-md) 0;
      padding:14px 16px;
      transition:border-left-color 0.15s,background 0.15s;
    }
    .entry-card:hover{
      background:rgba(26,34,54,.85);
      border-left-color:var(--accent);
    }
    .entry-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px;}
    .entry-period{
      font-size:0.75rem;color:var(--muted);
      padding:1px 8px;background:var(--surf2);border:1px solid var(--border);
      border-radius:20px;white-space:nowrap;
    }
    .entry-project{
      font-size:0.9rem;font-weight:700;color:var(--text);
      display:block;margin-bottom:10px;line-height:1.4;
    }
    .entry-badges{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;}
    .badge{
      padding:2px 9px;border-radius:20px;font-size:0.72rem;font-weight:500;
      background:var(--surf2);border:1px solid var(--border);color:var(--muted);
    }
    .badge.role{
      background:rgba(108,142,245,.12);border-color:rgba(108,142,245,.35);
      color:var(--accent-h);
    }
    .badge.tech{
      background:rgba(52,217,176,.08);border-color:rgba(52,217,176,.2);
      color:var(--accent2);
    }
    .entry-body-section{margin-top:12px;padding-top:12px;border-top:1px solid var(--border);}
    .entry-body-section+.entry-body-section{margin-top:10px;padding-top:10px;}
    .entry-label{
      font-size:0.72rem;font-weight:700;letter-spacing:0.06em;
      color:var(--text2);margin-bottom:6px;
      display:flex;align-items:center;gap:6px;
    }
    .entry-label::before{
      content:'';display:inline-block;width:3px;height:12px;
      background:var(--accent);border-radius:2px;flex-shrink:0;
    }
    .entry-label.achievement::before{background:var(--accent2);}
    .entry-body{font-size:0.87rem;color:var(--text);white-space:pre-wrap;line-height:1.8;}
    .entry-achievement{font-size:0.87rem;color:var(--text);white-space:pre-wrap;line-height:1.8;}
    .cert-list{display:flex;flex-direction:column;gap:8px;}
    .cert-card{
      border-left:2px solid rgba(108,142,245,.3);border-radius:0 var(--r-sm) var(--r-sm) 0;
      padding:8px 12px;transition:border-color 0.15s,background 0.15s;
    }
    .cert-card:hover{background:rgba(108,142,245,.04);border-left-color:var(--accent);}
    .cert-name{font-weight:600;font-size:0.9rem;color:var(--text);}
    .cert-meta{font-size:0.75rem;color:var(--muted);margin-top:4px;display:flex;flex-wrap:wrap;gap:10px;}
    .cert-date{color:var(--muted);}
    .cert-expiry{color:var(--warn);font-weight:500;}
    .cert-issuer{color:var(--muted);}
    .output-year-group{margin-bottom:14px;}
    .output-year-header{
      font-size:0.72rem;font-weight:700;color:var(--accent);
      padding:4px 0 6px;margin-bottom:6px;
      border-bottom:1px solid var(--border2);
      letter-spacing:0.06em;
    }
    .output-list{display:flex;flex-direction:column;gap:6px;}
    .output-item{display:flex;align-items:center;gap:8px;padding:3px 0;}
    .output-kind{
      font-size:0.68rem;font-weight:600;padding:2px 8px;border-radius:20px;flex-shrink:0;
      background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.3);color:var(--warn);
    }
    .output-title{font-size:0.85rem;color:var(--text);flex:1;}
    .output-date{font-size:0.73rem;color:var(--muted);flex-shrink:0;}
    .footer{
      margin-top:60px;padding-top:20px;border-top:1px solid var(--border);
      text-align:center;font-size:0.73rem;color:var(--muted);
    }
    @media(max-width:600px){
      .page{padding:20px 14px 60px;}
      .name-ja{font-size:1.4rem;}
      .output-item{flex-wrap:wrap;}
    }
  </style>
</head>

<script>
(() => {

  function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
  function fmtYM(s){if(!s)return '現在';const[y,m]=s.split('-');return `${y}年${String(m).padStart(2,'0')}月`;}
  function calcDuration(start,end){
    if(!start)return '';
    const[sy,sm]=start.split('-').map(Number);
    const now=new Date();
    const ey=end?Number(end.split('-')[0]):now.getFullYear();
    const em=end?Number(end.split('-')[1]):now.getMonth()+1;
    const months=(ey-sy)*12+(em-sm)+1;
    if(months<1)return '';
    const y=Math.floor(months/12),m=months%12;
    if(y===0)return `${m}ヶ月`;if(m===0)return `${y}年`;return `${y}年${m}ヶ月`;
  }
  function fmtTeamSize(s){if(!s)return s;return /^\d+$/.test(s.trim())?`${s.trim()}人`:s;}
  function multiline(s){return esc(s).replace(/\n/g,'<br>');}
  function groupByCompany(entries){
    const map=new Map();
    for(const e of entries){const k=e.company||'';if(!map.has(k))map.set(k,[]);map.get(k).push(e);}
    const groups=[];
    for(const[company,es]of map){
      const sorted=[...es].sort((a,b)=>{const ts=s=>{const p=s?.split('-').map(Number);return p?p[0]*100+p[1]:0;};return ts(b.periodStart)-ts(a.periodStart);});
      const earliest=sorted.reduce((acc,e)=>(!e.periodStart?acc:(!acc||e.periodStart<acc?e.periodStart:acc)),'');
      const hasNow=sorted.some(e=>!e.periodEnd);
      const latest=hasNow?'':sorted.reduce((acc,e)=>(!e.periodEnd?acc:(!acc||e.periodEnd>acc?e.periodEnd:acc)),'');
      groups.push({company,earliest,latest,entries:sorted});
    }
    return groups.sort((a,b)=>{const ts=s=>{const p=s?.split('-').map(Number);return p?p[0]*100+p[1]:0;};return ts(b.earliest)-ts(a.earliest);});
  }
  function groupByYear(outputs){
    const sorted=[...outputs].sort((a,b)=>(b.date||'').localeCompare(a.date||''));
    const map=new Map();
    for(const o of sorted){const y=o.date?o.date.slice(0,4):'年不明';if(!map.has(y))map.set(y,[]);map.get(y).push(o);}
    return [...map.entries()].sort((a,b)=>b[0].localeCompare(a[0]));
  }

  const data = window.__RESUME__;
  if(!data||!data.fullNameJa) return;

  const v=data.visibility??{};
  document.title=`${data.fullNameJa} - 職務経歴書`;

  const metaChips=[
    v.email!==false&&data.email?`<span class="meta-chip">✉ ${esc(data.email)}</span>`:'',
    v.phone!==false&&data.phone?`<span class="meta-chip">☏ ${esc(data.phone)}</span>`:'',
    v.nearestStation!==false&&data.nearestStation?`<span class="meta-chip">🚉 ${esc(data.nearestStation)}</span>`:'',
    v.birthDate!==false&&data.birthDate?`<span class="meta-chip">🎂 ${esc(data.birthDate)}</span>`:'',
  ].filter(Boolean).join('');

  const socialLinks=(data.socialLinks??[]).filter(l=>l.url).map(l=>{
    const label=l.service==='その他'&&l.label?l.label:l.service;
    return `<a class="social-chip" href="${esc(l.url)}" target="_blank" rel="noreferrer">${esc(label)}</a>`;
  }).join('');

  const skillsHtml=data.skillsJa?`<section class="section"><p class="section-title">技術スキル</p><div class="skill-list">${data.skillsJa.split('\n').map(s=>s.trim()).filter(Boolean).map(s=>`<span class="skill-chip">${esc(s)}</span>`).join('')}</div></section>`:'';

  const groups=groupByCompany(data.entries??[]);
  const timelineHtml=groups.length?`<section class="section"><p class="section-title">職務経歴</p><div class="timeline">${groups.map(g=>{
    const tenure=`${fmtYM(g.earliest)} ～ ${g.latest?fmtYM(g.latest):'現在'}`;
    const dur=calcDuration(g.earliest,g.latest);
    const entries=g.entries.map(e=>{
      const period=`${fmtYM(e.periodStart)} ～ ${e.periodEnd?fmtYM(e.periodEnd):'現在'}`;
      const dur2=calcDuration(e.periodStart,e.periodEnd);
      const project=[e.department,e.projectName].filter(Boolean).join(' / ');
      const techs=(e.technologies||'').split(/[,、，\n]/).map(t=>t.trim()).filter(Boolean);
      const badges=[
        e.role?`<span class="badge role">${esc(e.role)}</span>`:'',
        e.teamSize?`<span class="badge">${esc(fmtTeamSize(e.teamSize))}</span>`:'',
        ...techs.map(t=>`<span class="badge tech">${esc(t)}</span>`),
      ].filter(Boolean).join('');
      const body=[
        e.responsibilitiesJa?`<div class="entry-body-section"><p class="entry-label">担当業務</p><p class="entry-body">${multiline(e.responsibilitiesJa)}</p></div>`:'',
        e.achievementsJa?`<div class="entry-body-section"><p class="entry-label achievement">実績・成果</p><p class="entry-achievement">${multiline(e.achievementsJa)}</p></div>`:'',
      ].filter(Boolean).join('');
      return `<div class="entry-card">` +
        `<div class="entry-meta"><span class="entry-period">${esc(period)}${dur2?` (${esc(dur2)})`:''}` +
        `</span></div>` +
        `${project?`<p class="entry-project">${esc(project)}</p>`:''}` +
        `${badges?`<div class="entry-badges">${badges}</div>`:''}`+
        `${body}</div>`;
    }).join('');
    return `<div class="company-block"><div class="company-dot"></div><div class="company-header"><span class="company-name">${esc(g.company||'（会社名未入力）')}</span><span class="company-tenure">${esc(tenure)}${dur?` (${esc(dur)})`:''}` +
      `</span></div><div class="entry-list">${entries}</div></div>`;
  }).join('')}</div></section>`:'';

  const certs=(data.certifications??[]).filter(c=>c.name);
  const certsHtml=v.certifications!==false&&certs.length?`<section class="section"><p class="section-title">資格・認定</p><div class="cert-list">${[...certs].sort((a,b)=>(b.issuedDate||'').localeCompare(a.issuedDate||'')).map(c=>{
    const nameHtml=c.url?`<a href="${esc(c.url)}" target="_blank" rel="noreferrer">${esc(c.name)}</a>`:esc(c.name);
    const meta=[
      c.issuedDate?`<span class="cert-date">取得: ${esc(fmtYM(c.issuedDate))}</span>`:'',
      c.expiryDate?`<span class="cert-expiry">有効期限: ${esc(fmtYM(c.expiryDate))}</span>`:'',
      c.issuer?`<span class="cert-issuer">${esc(c.issuer)}</span>`:'',
    ].filter(Boolean).join('');
    return `<div class="cert-card"><p class="cert-name">${nameHtml}</p>${meta?`<div class="cert-meta">${meta}</div>`:''}</div>`;
  }).join('')}</div></section>`:'';

  const outputs=(data.outputs??[]).filter(o=>o.title||o.url);
  const outputsHtml=v.outputs!==false&&outputs.length?(()=>{
    const yearGroups=groupByYear(outputs);
    const inner=yearGroups.map(([year,items])=>{
      const rows=items.map(o=>{
        const dateStr=o.date?new Date(o.date).toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric',timeZone:'Asia/Tokyo'}):'';
        const titleHtml=o.url?`<a href="${esc(o.url)}" target="_blank" rel="noreferrer">${esc(o.title||o.url)}</a>`:esc(o.title);
        return `<div class="output-item"><span class="output-kind">${esc(o.kind)}</span><span class="output-title">${titleHtml}</span><span class="output-date">${esc(dateStr)}</span></div>`;
      }).join('');
      return `<div class="output-year-group"><p class="output-year-header">${esc(year)}年</p><div class="output-list">${rows}</div></div>`;
    }).join('');
    return `<section class="section"><p class="section-title">記事・登壇・ウェビナー</p>${inner}</section>`;
  })():'';

  app.innerHTML=`<div class="page">
    <header class="header">
      <h1 class="name-ja">${esc(data.fullNameJa)}</h1>
      ${data.fullNameEn?`<p class="name-en">${esc(data.fullNameEn)}</p>`:''}
      ${metaChips?`<div class="meta-chips">${metaChips}</div>`:''}
      ${socialLinks?`<div class="social-links">${socialLinks}</div>`:''}
      ${data.summaryJa?`<p class="summary">${multiline(data.summaryJa)}</p>`:''}
    </header>
    ${skillsHtml}${timelineHtml}${certsHtml}${outputsHtml}
    <footer class="footer"><p>最終更新: ${esc(data.__publishedAt__||'—')}</p></footer>
  </div>`;
})();
</script>
</body>
</html>
